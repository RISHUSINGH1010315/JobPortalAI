version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobpilot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jobpilot
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: jobpilot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
